name: Willhaben Watcher

on:
  schedule:
    # Каждый час в :07. Каждые 30 мин: "*/30 * * * *"
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      resend_all:
        description: "Переотправить ВСЕ текущие подходящие объявления (разово)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: willhaben-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_ALL: ${{ inputs.resend_all }}
        run: python willhaben_watcher.py

      - name: Commit seen.json if changed
        run: |
          git config user.name "willhaben-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "update seen listings [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push || echo "::warning::git push не удался (проверь Workflow permissions)"
          else
            echo "seen.json без изменений — коммит не нужен"
          fi
