name: Willhaben Watcher

on:
  schedule:
    # Каждый час в :07 минут. Меняешь частоту здесь.
    # Каждые 30 минут:  - cron: "*/30 * * * *"
    # Каждые 15 минут:  - cron: "*/15 * * * *"
    - cron: "7 * * * *"
  workflow_dispatch:   # позволяет запускать вручную кнопкой в GitHub

# Нужно, чтобы workflow мог коммитить обновлённый seen.json обратно в репозиторий
permissions:
  contents: write

# Не запускать два прогона одновременно
concurrency:
  group: willhaben-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python willhaben_watcher.py

      - name: Commit seen.json if changed
        run: |
          git config user.name "willhaben-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "update seen listings [skip ci]"
            git push
          else
            echo "seen.json без изменений — коммит не нужен"
          fi
