name: Willhaben Watcher

on:
  schedule:
    # Каждые 5 минут — минимальный интервал, который позволяет GitHub.
    # Реально запуски идут ~5–15 мин (расписание Actions — best effort).
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      resend_all:
        description: "Переотправить ВСЕ текущие подходящие (включая уже виденные)"
        type: boolean
        default: false
      resend_missed:
        description: "Переотправить только ПРОПУЩЕННЫЕ (что ещё не отправлялись)"
        type: boolean
        default: false

# Нужно, чтобы workflow мог коммитить обновлённый seen.json обратно в репозиторий
permissions:
  contents: write

# Не запускать два прогона одновременно
concurrency:
  group: willhaben-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_ALL: ${{ inputs.resend_all }}
          RESEND_MISSED: ${{ inputs.resend_missed }}
        run: python willhaben_watcher.py

      - name: Commit seen.json if changed
        run: |
          git config user.name "willhaben-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "update seen listings [skip ci]"
            # до 3 попыток: подтянуть чужие изменения (rebase) и запушить —
            # на случай гонки между параллельными/очередными прогонами
            for i in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
              if git push; then echo "seen.json запушен"; break; fi
              echo "push не удался, попытка $i"; sleep 3
            done
          else
            echo "seen.json без изменений — коммит не нужен"
          fi
